<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code — Mission Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="confettiCanvas"></canvas>
  <div class="grain"></div>
  <div class="grid-bg"></div>

  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="mission-badge">
          <div class="badge-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
          </div>
          <div class="badge-text">
            <h1 class="title">CLAUDE CODE</h1>
            <div class="title-sub">MASTERY CURRICULUM <span class="title-dot"></span> 4-WEEK MISSION</div>
          </div>
        </div>
        <div class="header-controls">
          <div class="status-light">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">STANDBY</span>
          </div>
          <button class="theme-toggle" id="themeToggle" title="Toggle light/dark theme">
            <svg class="theme-icon-dark" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="theme-icon-light" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="reset-btn" id="resetBtn" title="Reset all progress">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M2 2v5h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.05 10A6 6 0 1 0 2.68 5.5L2 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            RESET
          </button>
        </div>
      </div>

      <div class="gauge-panel">
        <div class="gauge-header">
          <div class="gauge-label">MISSION PROGRESS</div>
          <div class="gauge-readout">
            <span class="gauge-value" id="healthPercent">0</span><span class="gauge-unit">%</span>
          </div>
        </div>
        <div class="gauge-bar-wrapper">
          <div class="gauge-notches">
            <span data-label="0"></span>
            <span data-label="25"></span>
            <span data-label="50"></span>
            <span data-label="75"></span>
            <span data-label="100"></span>
          </div>
          <div class="gauge-track">
            <div class="gauge-fill" id="healthBarFill">
              <div class="gauge-glow"></div>
            </div>
          </div>
        </div>
        <div class="gauge-stats">
          <span class="gauge-stat"><span class="gauge-stat-val" id="completedCount">0</span> COMPLETED</span>
          <span class="gauge-stat"><span class="gauge-stat-val" id="totalCount">0</span> TOTAL OPS</span>
        </div>
      </div>
    </header>

    <main class="weeks" id="weeksContainer"></main>

    <footer class="footer">
      <div class="footer-line"></div>
      <p>CLAUDE CODE MASTERY CURRICULUM <span class="footer-dot"></span> MARCH 2026</p>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-warning-bar"></div>
      <div class="modal-body">
        <div class="modal-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <h3>CONFIRM MISSION RESET</h3>
        <p>All progress data will be purged. Completion state returns to zero. This action is irreversible.</p>
        <div class="modal-actions">
          <button class="modal-cancel" id="modalCancel">ABORT</button>
          <button class="modal-confirm" id="modalConfirm">CONFIRM RESET</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
