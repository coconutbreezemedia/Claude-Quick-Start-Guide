<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Training Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-top">
        <div class="title-group">
          <h1 class="title">Claude Code <span class="accent">Training</span></h1>
          <p class="subtitle">4-Week Mastery Curriculum</p>
        </div>
        <button class="reset-btn" id="resetBtn" title="Reset all progress">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 2v5h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.05 10A6 6 0 1 0 2.68 5.5L2 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span>Reset</span>
        </button>
      </div>

      <div class="health-bar-container">
        <div class="health-bar-labels">
          <span class="health-label">QUEST PROGRESS</span>
          <span class="health-percent" id="healthPercent">0%</span>
        </div>
        <div class="health-bar-track">
          <div class="health-bar-fill" id="healthBarFill">
            <div class="health-bar-shine"></div>
          </div>
          <div class="health-bar-segments">
            <span></span><span></span><span></span>
          </div>
        </div>
        <div class="health-bar-stats">
          <span id="completedCount">0</span> / <span id="totalCount">0</span> activities completed
        </div>
      </div>
    </header>

    <main class="weeks" id="weeksContainer">
      <!-- Rendered by JS -->
    </main>

    <footer class="footer">
      <p>Built for mastering Claude Code &mdash; one day at a time.</p>
    </footer>
  </div>

  <!-- Reset confirmation modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h3>Reset All Progress?</h3>
      <p>This will clear every checkbox and set your XP back to zero. This cannot be undone.</p>
      <div class="modal-actions">
        <button class="modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-confirm" id="modalConfirm">Reset Everything</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
